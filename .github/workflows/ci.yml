name: Java 25 Gradle CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Verify
        run: ./gradlew --no-daemon clean check publishToMavenLocal stageDistribution :hytale-server-patch:patchedServerJar
